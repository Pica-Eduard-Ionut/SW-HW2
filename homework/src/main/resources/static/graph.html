<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RDF Graph Visualization</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        #mynetwork { width: 100%; height: 600px; border: 1px solid lightgray; background-color: #ffffff; }
    </style>
</head>
<body>
    <header>
        <h1>RDF Ontology Graph</h1>
    </header>
    <nav>
        <a href="index.html">Upload Data</a>
        <a href="books.html">Books List</a>
        <a href="graph.html">RDF Graph Viewer</a>
    </nav>
    <div class="container">
        <h2>Knowledge Base Visualization</h2>
        <div id="mynetwork"></div>
    </div>

    <script src="js/app.js"></script>
    <script type="text/javascript">
        async function renderRealGraph() {
            try {
                const booksRes = await fetch('/api/books');
                const books = await booksRes.json();

                let nodesArr = [];
                let edgesArr = [];
                let idCounter = 1;

                books.forEach(book => {
                    let bookNodeId = idCounter++;
                    nodesArr.push({ id: bookNodeId, label: book.title + '\n(Book)', color: '#97c2fc', shape: 'box' });

                    let authorNodeId = idCounter++;
                    nodesArr.push({ id: authorNodeId, label: book.author + '\n(Author)', color: '#ffb347', shape: 'ellipse' });
                    edgesArr.push({ from: bookNodeId, to: authorNodeId, label: 'ex:author', arrows: 'to' });

                    if(book.themes) {
                        book.themes.forEach(theme => {
                            let themeNodeId = idCounter++;
                            nodesArr.push({ id: themeNodeId, label: theme + '\n(Theme)', color: '#98fb98', shape: 'ellipse' });
                            edgesArr.push({ from: bookNodeId, to: themeNodeId, label: 'ex:theme', arrows: 'to' });
                        });
                    }
                });

                var container = document.getElementById('mynetwork');
                var data = { 
                    nodes: new vis.DataSet(nodesArr), 
                    edges: new vis.DataSet(edgesArr) 
                };
                var options = { physics: { stabilization: true } };
                new vis.Network(container, data, options);

            } catch (error) {
                console.error("Nu am putut randa graful real:", error);
            }
        }
        
        document.addEventListener("DOMContentLoaded", renderRealGraph);
    </script>
</body>
</html>
